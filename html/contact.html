<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" href="../images/workplace.jpg">
    <link rel="stylesheet" href="../css/victor.css">
</head>
<body>
    <h1>Contact Us</h1>
    <img src="../images/character.png" alt="" style="width: 71px; height: 71px; border-radius: 50%; border: 1px solid black;">
    <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>

        <label>Gender:</label><br>
        <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="male"><br>
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="female"><br>

        <label>Courses:</label><br>
        <input type="checkbox" id="course1" name="courses1" value="course1">
        <label for="course1">Course 1</label><br>
        <input type="checkbox" id="course2" name="courses2" value="course2">
        <label for="course2">Course 2</label><br>
        <input type="checkbox" id="course3" name="courses3" value="course3">
        <label for="course3">Course 3</label><br>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4" required></textarea><br>

        <input type="submit" value="Send Message">
        <!-- <button type="submit">Send Message</button> -->
    </form>
    <a href="./about.html">Go to About Page</a>
</body>
</html>
